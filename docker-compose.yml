services:
  omni-infoflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omni-infoflow
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount local data directory for persistence
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - OMNIFLOW_DATA_DIR=/app/data
      # Provide your API keys here or in a .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - LARK_WEBHOOK_URL=${LARK_WEBHOOK_URL:-}
      - OMNIFLOW_ADMIN_TOKEN=${OMNIFLOW_ADMIN_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status == 200 else sys.exit(1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - omni-net

networks:
  omni-net:
    driver: bridge
